server:
  port: 8084

spring:
  application:
    name: synapse-access-service
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: SYNAPSE_GROUP
      config:
        group: SYNAPSE_GROUP
        file-extension: yaml
  # 从 Nacos 拉取:共享配置 + 本服务数据源/MyBatis/Redis/Feign 配置
  config:
    import:
      - optional:nacos:synapse-common.yaml?group=SYNAPSE_GROUP
      - optional:nacos:synapse-access-service.yaml?group=SYNAPSE_GROUP

logging:
  level:
    com.synapse.access: info
