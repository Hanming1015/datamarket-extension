server:
  port: 8085

spring:
  application:
    name: synapse-payment-service
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        group: SYNAPSE_GROUP
      config:
        group: SYNAPSE_GROUP
        file-extension: yaml
  config:
    import:
      - optional:nacos:synapse-common.yaml?group=SYNAPSE_GROUP
      - optional:nacos:synapse-payment-service.yaml?group=SYNAPSE_GROUP

logging:
  level:
    com.synapse.payment: info
