# Synapse 数据平台 —— 本地开发中间件编排
# 用法:
#   1) 复制 .env.example 为 .env,按需修改(.env 已被 .gitignore 屏蔽,勿提交)
#   2) docker compose up -d
# 说明:仅用于本地开发,非生产配置(无 TLS、单节点、口令来自 .env)。
services:

  # ---- 服务注册中心 + 配置中心 ----
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: synapse-nacos
    environment:
      MODE: standalone                      # 单机模式,内置 Derby,免外部 DB
      JVM_XMS: 512m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
    ports:
      - "8848:8848"     # 控制台 / OpenAPI
      - "9848:9848"     # 客户端 gRPC
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 关系数据库(一实例多 schema)----
  mysql:
    image: mysql:8.0
    container_name: synapse-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"     # 映射到 3307,避开本机可能已占用的 3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro   # 首次启动自动执行 init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 缓存 / 分布式锁 / 幂等(Phase 4c:Redis Sentinel 高可用,1 主 2 从 3 哨兵)----
  # 关键:服务跑在宿主机、Redis 在容器,所有节点统一用 ${REDIS_ANNOUNCE_IP}:<宿主端口> 对外通告,
  #       这样哨兵返回给宿主客户端的主库地址在宿主机可解析可达(容器侧走 hairpin 也可达)。
  redis-master:
    image: redis:7-alpine
    container_name: synapse-redis-master
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
      --appendonly yes
      --replica-announce-ip ${REDIS_ANNOUNCE_IP} --replica-announce-port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-replica-1:
    image: redis:7-alpine
    container_name: synapse-redis-replica-1
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
      --replicaof ${REDIS_ANNOUNCE_IP} 6379 --appendonly yes
      --replica-announce-ip ${REDIS_ANNOUNCE_IP} --replica-announce-port 6380
    ports:
      - "6380:6379"
    depends_on:
      - redis-master
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    container_name: synapse-redis-replica-2
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
      --replicaof ${REDIS_ANNOUNCE_IP} 6379 --appendonly yes
      --replica-announce-ip ${REDIS_ANNOUNCE_IP} --replica-announce-port 6381
    ports:
      - "6381:6379"
    depends_on:
      - redis-master
    restart: unless-stopped

  # 3 哨兵:监控 mymaster,quorum=2。配置写到 /tmp(哨兵运行时会 rewrite 该文件,故需可写)。
  redis-sentinel-1:
    image: redis:7-alpine
    container_name: synapse-redis-sentinel-1
    command:
      - sh
      - -c
      - |
        { echo 'port 26379'
          echo 'sentinel resolve-hostnames yes'
          echo 'sentinel announce-hostnames yes'
          echo 'sentinel monitor mymaster ${REDIS_ANNOUNCE_IP} 6379 2'
          echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}'
          echo 'sentinel down-after-milliseconds mymaster 5000'
          echo 'sentinel failover-timeout mymaster 10000'
          echo 'sentinel announce-ip ${REDIS_ANNOUNCE_IP}'
          echo 'sentinel announce-port 26379'
        } > /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      - redis-master
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: synapse-redis-sentinel-2
    command:
      - sh
      - -c
      - |
        { echo 'port 26380'
          echo 'sentinel resolve-hostnames yes'
          echo 'sentinel announce-hostnames yes'
          echo 'sentinel monitor mymaster ${REDIS_ANNOUNCE_IP} 6379 2'
          echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}'
          echo 'sentinel down-after-milliseconds mymaster 5000'
          echo 'sentinel failover-timeout mymaster 10000'
          echo 'sentinel announce-ip ${REDIS_ANNOUNCE_IP}'
          echo 'sentinel announce-port 26380'
        } > /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26380:26380"
    depends_on:
      - redis-master
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: synapse-redis-sentinel-3
    command:
      - sh
      - -c
      - |
        { echo 'port 26381'
          echo 'sentinel resolve-hostnames yes'
          echo 'sentinel announce-hostnames yes'
          echo 'sentinel monitor mymaster ${REDIS_ANNOUNCE_IP} 6379 2'
          echo 'sentinel auth-pass mymaster ${REDIS_PASSWORD}'
          echo 'sentinel down-after-milliseconds mymaster 5000'
          echo 'sentinel failover-timeout mymaster 10000'
          echo 'sentinel announce-ip ${REDIS_ANNOUNCE_IP}'
          echo 'sentinel announce-port 26381'
        } > /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
    ports:
      - "26381:26381"
    depends_on:
      - redis-master
    restart: unless-stopped

  # ---- 消息队列(异步解耦 / DLQ / 事件扇出)----
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: synapse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理控制台
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 对象存储(S3 兼容,存上传的 CSV)----
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: synapse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # 控制台
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 限流 / 熔断 / 降级 控制台 ----
  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: synapse-sentinel
    environment:
      # 控制台登录口令(客户端上报鉴权同用)
      AUTH_USERNAME: ${SENTINEL_USER}
      AUTH_PASSWORD: ${SENTINEL_PASSWORD}
    ports:
      - "8858:8858"
    restart: unless-stopped

  # ---- 指标采集(Phase 5):抓取 9 个宿主服务的 /actuator/prometheus ----
  # 服务在宿主机,Prometheus 在容器,靠 host.docker.internal 反向访问宿主。
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: synapse-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    extra_hosts:
      - "host.docker.internal:host-gateway"    # Linux 兼容;Docker Desktop 本就内置
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ---- 指标可视化(Phase 5):自动装配 Prometheus 数据源 + Synapse 总览仪表盘 ----
  grafana:
    image: grafana/grafana:11.1.0
    container_name: synapse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- 链路追踪(Phase 5):接收各服务上报的 span,可视化跨服务调用链 ----
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: synapse-zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

volumes:
  nacos-data:
  mysql-data:
  redis-master-data:
  rabbitmq-data:
  minio-data:
  prometheus-data:
  grafana-data:
