# Synapse 数据平台 —— 本地开发中间件编排
# 用法:
#   1) 复制 .env.example 为 .env,按需修改(.env 已被 .gitignore 屏蔽,勿提交)
#   2) docker compose up -d
# 说明:仅用于本地开发,非生产配置(无 TLS、单节点、口令来自 .env)。
services:

  # ---- 服务注册中心 + 配置中心 ----
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: synapse-nacos
    environment:
      MODE: standalone                      # 单机模式,内置 Derby,免外部 DB
      JVM_XMS: 512m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
    ports:
      - "8848:8848"     # 控制台 / OpenAPI
      - "9848:9848"     # 客户端 gRPC
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 关系数据库(一实例多 schema)----
  mysql:
    image: mysql:8.0
    container_name: synapse-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"     # 映射到 3307,避开本机可能已占用的 3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro   # 首次启动自动执行 init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 缓存 / 分布式锁 / 幂等 / 限流计数 ----
  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 消息队列(异步解耦 / DLQ / 事件扇出)----
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: synapse-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 管理控制台
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 对象存储(S3 兼容,存上传的 CSV)----
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: synapse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # 控制台
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- 限流 / 熔断 / 降级 控制台 ----
  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: synapse-sentinel
    environment:
      # 控制台登录口令(客户端上报鉴权同用)
      AUTH_USERNAME: ${SENTINEL_USER}
      AUTH_PASSWORD: ${SENTINEL_PASSWORD}
    ports:
      - "8858:8858"
    restart: unless-stopped

volumes:
  nacos-data:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
