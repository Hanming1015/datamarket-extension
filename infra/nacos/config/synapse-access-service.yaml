# =====================================================================
# Nacos 配置 · Data ID: synapse-access-service.yaml · Group: SYNAPSE_GROUP
# access-service 专属:数据源(synapse_access)+ MyBatis-Plus + Redis + Feign。
# 服务跑在宿主机,故连 127.0.0.1:3307(MySQL)/6379(Redis)。
# 形如 双下划线包裹的占位符 由 import-config.ps1 从 infra/.env 替换。
# =====================================================================
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/synapse_access?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: __MYSQL_ROOT_PASSWORD__
  cloud:
    sentinel:
      # 上报到已跑的 Sentinel Dashboard(仅用于观测;规则不靠它,见下)
      transport:
        dashboard: 127.0.0.1:8858
      eager: true                 # 启动即注册,不等首个请求才懒加载
      # 规则数据源 = Nacos:规则写进 Nacos,启动拉取 + 改配置实时推,持久化且可版本化。
      # 多副本(4b)时每个实例都从同一 Nacos dataId 拿到同一份规则。
      datasource:
        flow-rules:
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            group-id: SYNAPSE_GROUP
            data-id: synapse-access-service-flow-rules.json
            data-type: json
            rule-type: flow
        degrade-rules:
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            group-id: SYNAPSE_GROUP
            data-id: synapse-access-service-degrade-rules.json
            data-type: json
            rule-type: degrade
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: __REDIS_PASSWORD__
      timeout: 3000ms
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        # 消费 payment.succeeded 抛异常且重试耗尽 -> 走死信到 synapse.access.dlq
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0
          max-interval: 10000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid

# Feign:跨服务调用超时(编排链路串了 3 个下游,给足余量但不无限等)
feign:
  # 用 Sentinel 包裹 Feign:下游熔断/异常时走 @FeignClient 的 fallback,优雅降级不雪崩
  sentinel:
    enabled: true
  client:
    config:
      default:
        connect-timeout: 3000
        read-timeout: 5000

# 下单幂等锁 + outbox relay 参数(自定义前缀 synapse.access,由 @Value 注入)
synapse:
  access:
    lock-ttl-seconds: 10       # 同一 requester+dataset 提交的 Redis 锁持有时长
    outbox-relay-ms: 2000      # outbox relay 轮询间隔(ms)
