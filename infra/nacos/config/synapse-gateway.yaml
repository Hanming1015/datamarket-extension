# =====================================================================
# Nacos 配置 · Data ID: synapse-gateway.yaml · Group: SYNAPSE_GROUP
# 网关专属:路由表 + JWT 鉴权白名单。
# 路由用 lb://<服务名>,由 Nacos 服务发现 + 客户端负载均衡解析到实例。
# =====================================================================
spring:
  cloud:
    gateway:
      # 全局 CORS:允许前端(Vite dev)跨域访问网关。预检 OPTIONS 由此处应答,
      # 不进入 AuthGlobalFilter(该过滤器已放行 OPTIONS)。生产改 allowedOrigins 即可。
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: synapse-auth-service
          uri: lb://synapse-auth-service
          predicates:
            - Path=/api/auth/**
        - id: synapse-consent-service
          uri: lb://synapse-consent-service
          predicates:
            - Path=/api/consent/**
        - id: synapse-dataset-service
          uri: lb://synapse-dataset-service
          predicates:
            - Path=/api/datasets/**
        - id: synapse-access-service
          uri: lb://synapse-access-service
          predicates:
            - Path=/api/access/**
        - id: synapse-billing-service
          uri: lb://synapse-billing-service
          predicates:
            - Path=/api/billing/**
        - id: synapse-audit-service
          uri: lb://synapse-audit-service
          predicates:
            - Path=/api/audit/**
        - id: synapse-payment-service
          uri: lb://synapse-payment-service
          predicates:
            - Path=/api/payments/**
        - id: synapse-notification-service
          uri: lb://synapse-notification-service
          predicates:
            - Path=/api/notifications/**
    # Sentinel 网关限流(Phase 4a-2):按路由维度做边缘 QPS 流控,规则来自 Nacos。
    sentinel:
      transport:
        dashboard: 127.0.0.1:8858   # 仅观测;规则走下面的 Nacos 数据源
      eager: true
      # 被限流时的统一返回体(HTTP 429 + Result 信封;message 特意标 gateway 以区分服务级流控)
      scg:
        fallback:
          mode: response
          response-status: 429
          content-type: application/json;charset=UTF-8
          response-body: '{"code":429,"message":"gateway throttled, please retry later","data":null}'
      datasource:
        gw-flow:
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            username: ${NACOS_USERNAME:nacos}
            password: ${NACOS_PASSWORD:nacos}
            group-id: SYNAPSE_GROUP
            data-id: synapse-gateway-flow-rules.json
            data-type: json
            rule-type: gw-flow

# 网关鉴权白名单:命中这些路径的请求跳过 JWT 校验(登录/注册本就没 token)。
synapse:
  gateway:
    auth:
      whitelist:
        - /api/auth/login
        - /api/auth/register
